          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        review_notes:
          type: string
          nullable: true
        created_question_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
