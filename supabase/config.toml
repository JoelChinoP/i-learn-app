project_id = "learn-app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.register-account]
verify_jwt = false

[functions.link-student]
verify_jwt = false

[functions.rotate-link-code]
verify_jwt = false

[functions.ingest-response]
verify_jwt = false

[functions.orchestrate-feedback]
verify_jwt = false

[functions.reexplain-response]
verify_jwt = false

[functions.embed-knowledge]
verify_jwt = false
